name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI (trusted publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
